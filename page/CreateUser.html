<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创建用户</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
    </style>
</head>

<body>
    <div id="app" class="d-flex justify-content-center align-items-center min-vh-100">
        <div class="card shadow" style="width: 360px; max-width: 100%; border-radius: 12px;">
            <div class="card-body p-4">
                <h4 class="text-center mb-4">创建用户</h4>

                <div class="mb-3">
                    <label class="form-label">用户名</label>
                    <input type="text" class="form-control" v-model="username" placeholder="请输入用户名"
                        @keyup.enter="handleLogin">
                </div>

                <div class="mb-4">
                    <label class="form-label">密码</label>
                    <input type="password" class="form-control" v-model="password" placeholder="请输入密码"
                        @keyup.enter="handleLogin">
                </div>

                <div class="mb-4">
                    <label class="form-label">确认密码</label>
                    <input type="password" class="form-control" v-model="confirmPassword" placeholder="请再次输入密码"
                        @keyup.enter="handleLogin">
                </div>

                <p class="text-center mb-3 small"
                    :style="{ visibility: errorMsg ? 'visible' : 'hidden', minHeight: '1.2em', backgroundColor: 'rgba(255, 182, 193, 0.5)', color: '#000', padding: '4px 8px', borderRadius: '4px' }">
                    {{ errorMsg || '.' }}</p>

                <button class="btn btn-primary w-100" :disabled="loading" @click="handleLogin">
                    <span v-if="loading" class="spinner-border spinner-border-sm me-2"></span>
                    {{ loading ? '创建中...' : '创建' }}
                </button>

                <button class="btn btn-link w-100 mt-2 text-decoration-none" @click="goToLogin">返回</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/vue@3.4.21/dist/vue.global.prod.js"></script>
    <script>
        const { createApp } = Vue

        createApp({
            data() {
                return {
                    username: '',
                    password: '',
                    confirmPassword: '',
                    loading: false,
                    errorMsg: ''
                }
            },
            methods: {
                goToLogin() {
                    window.location.href = '/login.html'
                },
                async handleLogin() {
                    if (!this.username.trim() || !this.password.trim() || !this.confirmPassword.trim()) {
                        this.errorMsg = '请填写所有字段'
                        return
                    }

                    if (this.password !== this.confirmPassword) {
                        this.errorMsg = '两次输入的密码不一致'
                        return
                    }

                    this.errorMsg = ''
                    this.loading = true

                    try {
                        const response = await fetch(' /api/v1/users', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                action: '创建用户',
                                username: this.username,
                                password: this.password
                            })
                        })
                        if (response.ok) {
                            const data = await response.json()
                            console.log('创建成功:', data)
                            alert('创建成功！')
                        } else {
                            const err = await response.json()
                            console.error('创建失败:', err)
                            this.errorMsg = '创建失败：' + (err.message || '用户名已存在')
                        }
                    } catch (error) {
                        console.error('请求异常:', error)
                        this.errorMsg = '网络异常，请稍后重试'
                    } finally {
                        this.loading = false
                    }
                }
            }
        }).mount('#app')
    </script>
</body>

</html>
