<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用户登录</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
  </style>
</head>
<body>
  <div id="app" class="d-flex justify-content-center align-items-center min-vh-100">
    <div class="card shadow" style="width: 360px; max-width: 100%; border-radius: 12px;">
      <div class="card-body p-4">
        <h4 class="text-center mb-4">用户登录</h4>

        <div class="mb-3">
          <input
            type="text"
            class="form-control"
            v-model="username"
            placeholder="请输入用户名"
            @keyup.enter="handleLogin">
        </div>

        <div class="mb-4">
          <input
            type="password"
            class="form-control"
            v-model="password"
            placeholder="请输入密码"
            @keyup.enter="handleLogin">
        </div>

        <p class="text-center mb-3 small" :style="{ visibility: errorMsg ? 'visible' : 'hidden', minHeight: '1.2em', backgroundColor: 'rgba(255, 182, 193, 0.5)', color: '#000', padding: '4px 8px', borderRadius: '4px' }">{{ errorMsg || '.' }}</p>

        <button
          class="btn btn-primary w-100"
          :disabled="loading"
          @click="handleLogin">
          <span v-if="loading" class="spinner-border spinner-border-sm me-2"></span>
          {{ loading ? '登录中...' : '登录' }}
        </button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/vue@3.4.21/dist/vue.global.prod.js"></script>
  <script>
    const { createApp } = Vue

    createApp({
      data() {
        return {
          username: '',
          password: '',
          loading: false,
          errorMsg: ''
        }
      },
      methods: {
        async handleLogin() {
          if (!this.username.trim() || !this.password.trim()) {
            this.errorMsg = '请输入用户名和密码'
            return
          }

          this.errorMsg = ''
          this.loading = true

          try {
            const response = await fetch('/api/v1/login', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                username: this.username,
                password: this.password
              })
            })

            if (response.ok) {
              const data = await response.json()
              console.log('登录成功:', data)
              alert('登录成功！')
            } else {
              const err = await response.json()
              console.error('登录失败:', err)
              this.errorMsg = '登录失败：' + (err.message || '用户名或密码错误')
            }
          } catch (error) {
            console.error('请求异常:', error)
            this.errorMsg = '网络异常，请稍后重试'
          } finally {
            this.loading = false
          }
        }
      }
    }).mount('#app')
  </script>
</body>
</html>
